<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icon Generator — DriverProfit</title>
<style>
    body { font-family: sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
    canvas { border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
    button { padding: 12px 28px; background: #e5c158; color: #030d05; font-weight: 800; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; }
    p { color: #6b7280; font-size: 13px; text-align: center; }
</style>
</head>
<body>

<canvas id="c" width="512" height="512"></canvas>
<button onclick="downloadBoth()">Download icon-192.png + icon-512.png</button>
<p>Save both files to your project root (same folder as index.html)</p>

<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.height = size;
    const r = size * 0.18;

    // Background rounded rect
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#030d05';
    ctx.fill();

    // Gold ring
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size * 0.36, 0, Math.PI * 2);
    ctx.strokeStyle = '#e5c158';
    ctx.lineWidth = size * 0.04;
    ctx.stroke();

    // ₦ symbol
    ctx.fillStyle = '#e5c158';
    ctx.font = `900 ${size * 0.42}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('₦', size / 2, size * 0.52);
}

// Draw preview at 512
drawIcon(document.getElementById('c'), 512);

function downloadBoth() {
    [192, 512].forEach(size => {
        const c = document.createElement('canvas');
        drawIcon(c, size);
        const a = document.createElement('a');
        a.download = `icon-${size}.png`;
        a.href = c.toDataURL('image/png');
        a.click();
    });
}
</script>
</body>
</html>
